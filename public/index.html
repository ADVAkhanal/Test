    <script>
        // CLEAN STATE - No hardcoded data here anymore!
        const _state = { avail: {}, loaded: {} };
        const MONTHS_2026 = ["2026-01","2026-02","2026-03","2026-04","2026-05","2026-06","2026-07","2026-08","2026-09","2026-10","2026-11","2026-12"];

        // 1. LOAD DATA FROM DATABASE
async function loadFromServer() {
    try {
        const res = await fetch('/api/datasets/latest/data');
        const data = await res.json();

        if (!data || !data.wcs || !data.wcs.length) {
            console.warn("No dataset found");
            return;
        }

        const avail = {};
        const loaded = {};

        data.wcs.forEach(wc => {
            avail[wc.wc] = {};
            loaded[wc.wc] = {};

            wc.months.forEach(m => {
                const key = convertLabelToISO(m.label);
                avail[wc.wc][key] = m.cap;
                loaded[wc.wc][key] = m.load;
            });
        });

        // overwrite state
        Object.keys(_state.avail).forEach(k => delete _state.avail[k]);
        Object.assign(_state.avail, avail);

        Object.keys(_state.loaded).forEach(k => delete _state.loaded[k]);
        Object.assign(_state.loaded, loaded);

        rebuildAll();
        function showToast(msg) {
    console.log(msg);
} catch (e) {
        console.error("Load error:", e);
    }
}

// Helper (KEEP THIS BELOW loadFromServer)
// 1. LOAD DATA FROM DATABASE
async function loadFromServer() {
    try {
        const res = await fetch('/api/datasets/latest/data');
        const data = await res.json();

        if (!data || !data.wcs || !data.wcs.length) {
            console.warn("No dataset found");
            return;
        }

        const avail = {};
        const loaded = {};

        data.wcs.forEach(wc => {
            avail[wc.wc] = {};
            loaded[wc.wc] = {};

            wc.months.forEach(m => {
                const key = convertLabelToISO(m.label);
                avail[wc.wc][key] = m.cap;
                loaded[wc.wc][key] = m.load;
            });
        });

        // overwrite state
        Object.keys(_state.avail).forEach(k => delete _state.avail[k]);
        Object.assign(_state.avail, avail);

        Object.keys(_state.loaded).forEach(k => delete _state.loaded[k]);
        Object.assign(_state.loaded, loaded);

        rebuildAll();
        showToast("✓ Data loaded from database");

    } catch (e) {
        console.error("Load error:", e);
    }
}

// Helper (KEEP THIS BELOW loadFromServer)
function convertLabelToISO(label) {
    const [mon, yr] = label.split(' ');
    const months = {
        Jan:'01', Feb:'02', Mar:'03', Apr:'04', May:'05', Jun:'06',
        Jul:'07', Aug:'08', Sep:'09', Oct:'10', Nov:'11', Dec:'12'
    };
    return `20${yr}-${months[mon]}`;
}

        // 2. UPLOAD LOGIC: Send files to your server.js API
        async function handleLoadedUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            
            showToast("Processing Load Data...");
            const res = await fetch('/api/upload/load', { method: 'POST', body: formData });
            if (res.ok) loadFromServer(); // Refresh after upload
        }

        async function handleAvailUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            
            showToast("Processing Capacity Data...");
            const res = await fetch('/api/upload/cap', { method: 'POST', body: formData });
            if (res.ok) loadFromServer(); // Refresh after upload
        }
