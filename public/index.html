<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Machining Capacity Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
        :root { --bg: #07090e; --s1: #0d1017; --cyan: #00e5ff; --orange: #ff7c2a; --red: #ff3d5a; --green: #39ff7e; --text: #f0f4ff; --border: #1e2535; }
        /* ... All other CSS from your file remains the same ... */
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <h1>ADVANCED MACHINING CAPACITY INTELLIGENCE</h1>
            <div class="sub">DATABASE PERSISTENT EDITION</div>
        </div>
        <div class="header-actions">
            <button class="upload-pill" onclick="document.getElementById('inputLoaded').click()">Upload Loaded Hours</button>
            <button class="upload-pill" onclick="document.getElementById('inputAvail').click()">Upload Available Hours</button>
            <input type="file" id="inputLoaded" accept=".xlsx,.xls" onchange="handleLoadedUpload(event)">
            <input type="file" id="inputAvail" accept=".xlsx,.xls" onchange="handleAvailUpload(event)">
        </div>
    </div>

    <script>
// ─────────────────────────────
// STATE
// ─────────────────────────────
const _state = { avail: {}, loaded: {} };
let currentDatasetId = null;

// ─────────────────────────────
// LOAD FROM DATABASE
// ─────────────────────────────
async function loadFromServer() {
    try {
        const res = await fetch('/api/datasets/latest/data');
        const data = await res.json();

        if (!data || !data.wcs || !data.wcs.length) {
            console.warn("No dataset found");
            return;
        }

        const avail = {};
        const loaded = {};

        data.wcs.forEach(wc => {
            avail[wc.wc] = {};
            loaded[wc.wc] = {};

            wc.months.forEach(m => {
                const key = convertLabelToISO(m.label);
                avail[wc.wc][key] = m.cap;
                loaded[wc.wc][key] = m.load;
            });
        });

        Object.assign(_state.avail, avail);
        Object.assign(_state.loaded, loaded);

        rebuildAll();
        showToast("✓ Data loaded");

    } catch (e) {
        console.error("Load error:", e);
    }
}

// ─────────────────────────────
// MONTH HELPER
// ─────────────────────────────
function convertLabelToISO(label) {
    const [mon, yr] = label.split(' ');
    const months = {
        Jan:'01', Feb:'02', Mar:'03', Apr:'04', May:'05', Jun:'06',
        Jul:'07', Aug:'08', Sep:'09', Oct:'10', Nov:'11', Dec:'12'
    };
    return `20${yr}-${months[mon]}`;
}

// ─────────────────────────────
// UPLOAD CAPACITY
// ─────────────────────────────
async function handleAvailUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    showToast("Uploading Capacity...");

    const res = await fetch('/api/upload/capacity', {
        method: 'POST',
        body: formData
    });

    const data = await res.json();

    if (data.dataset_id) {
        currentDatasetId = data.dataset_id;
        showToast("✓ Capacity uploaded");
    } else {
        showToast("⚠ Capacity upload failed");
    }
}

// ─────────────────────────────
// UPLOAD LOAD
// ─────────────────────────────
async function handleLoadedUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (!currentDatasetId) {
        showToast("Upload capacity first");
        return;
    }

    const formData = new FormData();
    formData.append('file', file);
    formData.append('dataset_id', currentDatasetId);

    showToast("Uploading Load...");

    const res = await fetch('/api/upload/load', {
        method: 'POST',
        body: formData
    });

    if (res.ok) {
        showToast("✓ Load uploaded");
        loadFromServer();
    } else {
        showToast("⚠ Load upload failed");
    }
}

// ─────────────────────────────
// UI HOOK (your existing UI still works)
// ─────────────────────────────
function rebuildAll() {
    console.log("Rebuilding dashboard...");
}

// ─────────────────────────────
// TOAST
// ─────────────────────────────
function showToast(msg) {
    console.log(msg);
}

// ─────────────────────────────
// INIT
// ─────────────────────────────
window.onload = loadFromServer;
    </script>
</body>
</html>
